<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Battaglia Navale</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #f0f0f0;
            font-family: Arial, sans-serif;
        }
        
        #gameContainer {
            background-color: white;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            padding: 20px;
            max-width: 1000px;
        }
        
        canvas {
            border: 2px solid #333;
            display: block;
            margin: 0 auto;
            background-color: white;
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-top: 0;
        }
        
        .info {
            text-align: center;
            margin-top: 15px;
            font-size: 14px;
            color: #666;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <h1>⚓ Battaglia Navale ⚓</h1>
        <canvas id="gameCanvas" width="1000" height="800"></canvas>
        <div class="info">
            <p><strong>Tasto Sinistro:</strong> Seleziona cella | <strong>Tasto Destro:</strong> Conferma o Cambia turno</p>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Colori
        const COLORS = {
            WHITE: '#FFFFFF',
            BLACK: '#000000',
            BLUE: '#0000FF',
            RED: '#FF0000',
            YELLOW: '#FFFF00',
            LIGHT_GRAY: '#F0F0F0'
        };

        // Griglia
        const GRID = {
            x: 49,
            y: 49,
            cellSize: 50,
            gridSize: 499,
            offsetArray: 1
        };

        // Bottone Fine Turno
        const BUTTON_END_TURN = {
            x: 600,
            y: 49,
            width: 200,
            height: 60,
            text: 'Fine turno',
            fontSize: 20
        };

        // Struttura giocatore
        class Giocatore {
            constructor(colore) {
                this.hitbox = Array(10).fill(null).map(() => Array(10).fill(false));
                this.attackVS = Array(10).fill(null).map(() => Array(10).fill(false));
                this.preview = Array(10).fill(null).map(() => Array(10).fill(false));
                this.isPreview = false;
                this.turn = false;
                this.colore = colore;
            }
        }

        const blu = new Giocatore(COLORS.BLUE);
        const rosso = new Giocatore(COLORS.RED);
        blu.turn = true;

        // Funzione: Ottieni il giocatore attivo
        function getActivePlayer() {
            if (blu.turn) return blu;
            if (rosso.turn) return rosso;
            return null;
        }

        // Funzione: Converti coordinate pixel in array
        function getGridCoordinates(mouseX, mouseY) {
            const cellX = Math.floor((mouseX - GRID.x) / GRID.cellSize);
            const cellY = Math.floor((mouseY - GRID.y) / GRID.cellSize);
            return { x: cellX, y: cellY };
        }

        // Funzione: Verifica collisione punto-rettangolo
        function checkCollisionPointRec(pointX, pointY, recX, recY, recW, recH) {
            return pointX >= recX && pointX <= recX + recW &&
                   pointY >= recY && pointY <= recY + recH;
        }

        // Gestore input
        document.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            const giocatore = getActivePlayer();
            if (!giocatore) return;

            // Reset preview
            for (let y = 0; y < 10; y++) {
                for (let x = 0; x < 10; x++) {
                    giocatore.preview[x][y] = false;
                }
            }

            // Hover su griglia
            if (checkCollisionPointRec(mouseX, mouseY, GRID.x, GRID.y, GRID.gridSize, GRID.gridSize)) {
                const { x: cellX, y: cellY } = getGridCoordinates(mouseX, mouseY);
                if (cellX >= 0 && cellX < 10 && cellY >= 0 && cellY < 10) {
                    giocatore.preview[cellX][cellY] = true;
                    giocatore.isPreview = true;
                }
            }
        });

        document.addEventListener('mousedown', (e) => {
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            const giocatore = getActivePlayer();
            if (!giocatore) return;

            // Bottone Fine Turno (tasto destro)
            if (e.button === 2) {
                if (checkCollisionPointRec(mouseX, mouseY, BUTTON_END_TURN.x, BUTTON_END_TURN.y, 
                                          BUTTON_END_TURN.width, BUTTON_END_TURN.height)) {
                    giocatore.turn = false;
                    if (giocatore === blu) {
                        rosso.turn = true;
                    } else {
                        blu.turn = true;
                    }
                }
                
                // Conferma attacco su griglia
                if (checkCollisionPointRec(mouseX, mouseY, GRID.x, GRID.y, GRID.gridSize, GRID.gridSize)) {
                    const { x: cellX, y: cellY } = getGridCoordinates(mouseX, mouseY);
                    if (cellX >= 0 && cellX < 10 && cellY >= 0 && cellY < 10) {
                        if (!giocatore.hitbox[cellX][cellY]) {
                            giocatore.hitbox[cellX][cellY] = giocatore.preview[cellX][cellY];
                            giocatore.isPreview = false;
                        }
                    }
                }
            }
        });

        // Disabilita menu contestuale
        document.addEventListener('contextmenu', (e) => e.preventDefault());

        // Funzione: Disegna la griglia
        function drawGrid() {
            ctx.strokeStyle = COLORS.BLACK;
            ctx.lineWidth = 1;

            for (let i = 0; i <= 10; i++) {
                const pos = GRID.x + i * GRID.cellSize;
                // Linee verticali
                ctx.beginPath();
                ctx.moveTo(pos, GRID.y);
                ctx.lineTo(pos, GRID.y + GRID.gridSize);
                ctx.stroke();

                // Linee orizzontali
                ctx.beginPath();
                ctx.moveTo(GRID.x, pos);
                ctx.lineTo(GRID.x + GRID.gridSize, pos);
                ctx.stroke();
            }
        }

        // Funzione: Disegna gli hitbox
        function drawHitbox() {
            const giocatore = getActivePlayer();
            if (!giocatore) return;

            for (let y = 0; y < 10; y++) {
                for (let x = 0; x < 10; x++) {
                    if (giocatore.hitbox[x][y]) {
                        const cellX = GRID.x + (x * GRID.cellSize);
                        const cellY = GRID.y + (y * GRID.cellSize);
                        ctx.fillStyle = giocatore.colore;
                        ctx.fillRect(cellX, cellY, GRID.cellSize, GRID.cellSize);
                    }
                }
            }
        }

        // Funzione: Disegna preview
        function drawPreview() {
            const giocatore = getActivePlayer();
            if (!giocatore || !giocatore.isPreview) return;

            for (let y = 0; y < 10; y++) {
                for (let x = 0; x < 10; x++) {
                    if (giocatore.preview[x][y] && !giocatore.hitbox[x][y]) {
                        const cellX = GRID.x + (x * GRID.cellSize);
                        const cellY = GRID.y + (y * GRID.cellSize);
                        ctx.fillStyle = COLORS.YELLOW;
                        ctx.fillRect(cellX, cellY, GRID.cellSize, GRID.cellSize);
                    }
                }
            }
        }

        // Funzione: Disegna bottone
        function drawButton() {
            const giocatore = getActivePlayer();
            const buttonText = `Fine turno - Gioca: ${giocatore === blu ? 'BLU' : 'ROSSO'}`;

            ctx.fillStyle = COLORS.LIGHT_GRAY;
            ctx.fillRect(BUTTON_END_TURN.x, BUTTON_END_TURN.y, BUTTON_END_TURN.width, BUTTON_END_TURN.height);
            ctx.strokeStyle = COLORS.BLACK;
            ctx.lineWidth = 2;
            ctx.strokeRect(BUTTON_END_TURN.x, BUTTON_END_TURN.y, BUTTON_END_TURN.width, BUTTON_END_TURN.height);

            ctx.fillStyle = COLORS.BLACK;
            ctx.font = `${BUTTON_END_TURN.fontSize}px Arial`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(buttonText, BUTTON_END_TURN.x + BUTTON_END_TURN.width / 2, 
                        BUTTON_END_TURN.y + BUTTON_END_TURN.height / 2);
        }

        // Loop di rendering
        function gameLoop() {
            // Clear canvas
            ctx.fillStyle = COLORS.WHITE;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Disegna UI
            drawGrid();
            drawHitbox();
            drawPreview();
            drawButton();

            requestAnimationFrame(gameLoop);
        }

        // Avvia il gioco
        gameLoop();
    </script>
</body>
</html>
